name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  test:
    name: Test (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: documind_test
          MYSQL_USER: documind
          MYSQL_PASSWORD: documind_ci_password
          MYSQL_ROOT_PASSWORD: root_ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -proot_ci_password"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
          - 6334:6334
    strategy:
      matrix:
        java-version: [17]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Run tests
        env:
          DOCUMIND_MYSQL_TEST_URL: jdbc:mysql://localhost:3306/documind_test?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
          DOCUMIND_MYSQL_TEST_USERNAME: documind
          DOCUMIND_MYSQL_TEST_PASSWORD: documind_ci_password
          DOCUMIND_ADMIN_PASSWORD: test-profile-admin-password
        run: |
          until curl -fsS http://127.0.0.1:6333/healthz; do sleep 1; done
          mvn test -B

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java-version }}
          path: target/surefire-reports/
          retention-days: 7

  build:
    name: Build JAR
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build package
        run: mvn package -DskipTests -B

      - name: Verify local configs are excluded from JAR
        run: |
          if jar tf target/documind-1.0.0-SNAPSHOT.jar | grep -E '(^|/)application-(dev|local)\.yml$'; then
            echo "Local config file was packaged into the JAR"
            exit 1
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: documind-jar
          path: target/documind-*.jar
          retention-days: 3

  dependency-check:
    name: Dependency vulnerability scan
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Run OWASP dependency-check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.github/dependency-check-suppressions.xml \
            -B

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  docker:
    name: Build and scan Docker image
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: documind:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: documind:${{ github.sha }}
          format: table
          output: trivy-image-report.txt
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt
          retention-days: 30
