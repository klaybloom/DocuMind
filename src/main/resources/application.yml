server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: ${DOCUMIND_MAX_FILE_SIZE:50MB}
      max-request-size: ${DOCUMIND_MAX_FILE_SIZE:50MB}
  datasource:
    url: jdbc:h2:file:${DOCUMIND_DB_PATH:${user.dir}/documents/.documind-db};DB_CLOSE_DELAY=-1;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: ${DOCUMIND_DB_USERNAME:sa}
    password: ${DOCUMIND_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# Application Configuration
app:
  # Document storage directory
  documents-path: ${user.dir}/documents
  documents:
    stale-days: ${DOCUMIND_STALE_DAYS:180}
    max-file-size: ${DOCUMIND_MAX_FILE_SIZE:50MB}

  audit:
    max-events: ${DOCUMIND_AUDIT_MAX_EVENTS:10000}

  chat:
    rate-limit-per-minute: ${DOCUMIND_CHAT_RATE_LIMIT_PER_MINUTE:30}
    stream:
      timeout-seconds: ${DOCUMIND_CHAT_STREAM_TIMEOUT_SECONDS:120}
      core-pool-size: ${DOCUMIND_CHAT_STREAM_CORE_POOL_SIZE:4}
      max-pool-size: ${DOCUMIND_CHAT_STREAM_MAX_POOL_SIZE:8}
      queue-capacity: ${DOCUMIND_CHAT_STREAM_QUEUE_CAPACITY:100}

  rag:
    max-results: ${DOCUMIND_RAG_MAX_RESULTS:3}
    min-score: ${DOCUMIND_RAG_MIN_SCORE:0.65}
    keyword-min-hit-ratio: ${DOCUMIND_RAG_KEYWORD_MIN_HIT_RATIO:0.25}
    retrieval-pool-size: ${DOCUMIND_RAG_RETRIEVAL_POOL_SIZE:50}
    chunk-size: ${DOCUMIND_RAG_CHUNK_SIZE:500}
    chunk-overlap: ${DOCUMIND_RAG_CHUNK_OVERLAP:50}

  # CORS Configuration
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}

  # DeepSeek API Configuration
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}

  # Basic authentication for internal deployment
  security:
    admin-username: ${DOCUMIND_ADMIN_USERNAME:admin}
    admin-password: ${DOCUMIND_ADMIN_PASSWORD:}
    user-username: ${DOCUMIND_USER_USERNAME:}
    user-password: ${DOCUMIND_USER_PASSWORD:}
    user-knowledge-bases: ${DOCUMIND_USER_KNOWLEDGE_BASES:default}
    min-password-length: ${DOCUMIND_MIN_PASSWORD_LENGTH:12}
# Logging
logging:
  level:
    com.documind: INFO
    dev.langchain4j: WARN
