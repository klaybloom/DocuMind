server:
  # CloudBase Run 等容器平台会注入 PORT；本地默认仍使用 8080。
  port: ${PORT:8080}

spring:
  profiles:
    # 所有环境统一使用 MySQL 和 Redis。
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  messages:
    # Bean Validation 和业务提示的消息文件前缀。
    basename: messages
    fallback-to-system-locale: false
  servlet:
    multipart:
      # 上传文件和整次请求共用同一个大小上限，避免前后端限制不一致。
      max-file-size: ${DOCUMIND_MAX_FILE_SIZE:50MB}
      max-request-size: ${DOCUMIND_MAX_FILE_SIZE:50MB}
  jpa:
    # Controller 不持有懒加载数据库会话，避免视图层触发隐式查询。
    open-in-view: false
  flyway:
    # MySQL 是唯一关系型存储，所有表由 Flyway 管理。
    enabled: true
    locations: classpath:db/migration/mysql

# 应用业务配置。
app:
  # 原始文档默认放在项目 documents 目录；向量数据由 Qdrant 持久化。
  documents-path: ${user.dir}/documents
  documents:
    # 超过该天数的文档会在健康检查中提示为长期未更新。
    stale-days: ${DOCUMIND_STALE_DAYS:180}
    # 业务层文件大小上限，应与 servlet multipart 限制保持一致。
    max-file-size: ${DOCUMIND_MAX_FILE_SIZE:50MB}

  audit:
    # 审计列表接口最多返回的事件数量。
    max-events: ${DOCUMIND_AUDIT_MAX_EVENTS:10000}

  chat:
    # 每个账号每分钟问答次数；0 表示关闭限流。
    rate-limit-per-minute: ${DOCUMIND_CHAT_RATE_LIMIT_PER_MINUTE:30}
    stream:
      # 流式问答的整体超时时间。
      timeout-seconds: ${DOCUMIND_CHAT_STREAM_TIMEOUT_SECONDS:120}
      # SSE 问答线程池核心线程数。
      core-pool-size: ${DOCUMIND_CHAT_STREAM_CORE_POOL_SIZE:4}
      # SSE 问答线程池最大线程数。
      max-pool-size: ${DOCUMIND_CHAT_STREAM_MAX_POOL_SIZE:8}
      # SSE 问答排队容量，防止突发请求压垮服务。
      queue-capacity: ${DOCUMIND_CHAT_STREAM_QUEUE_CAPACITY:100}

  rag:
    # 最终带入 LLM 的文档片段数量。
    max-results: ${DOCUMIND_RAG_MAX_RESULTS:3}
    # 向量检索最低相似度，低于该值不会作为直接命中。
    min-score: ${DOCUMIND_RAG_MIN_SCORE:0.65}
    # 关键词补充检索的最低命中比例。
    keyword-min-hit-ratio: ${DOCUMIND_RAG_KEYWORD_MIN_HIT_RATIO:0.25}
    # 向量检索候选池大小，再从候选中筛选最终片段。
    retrieval-pool-size: ${DOCUMIND_RAG_RETRIEVAL_POOL_SIZE:50}
    # 文档切分长度。
    chunk-size: ${DOCUMIND_RAG_CHUNK_SIZE:500}
    # 相邻片段重叠长度，帮助跨段问题保留上下文。
    chunk-overlap: ${DOCUMIND_RAG_CHUNK_OVERLAP:50}

  vector-store:
    qdrant:
      host: ${DOCUMIND_QDRANT_HOST:127.0.0.1}
      grpc-port: ${DOCUMIND_QDRANT_GRPC_PORT:6334}
      health-url: ${DOCUMIND_QDRANT_HEALTH_URL:http://127.0.0.1:6333/healthz}
      collection: ${DOCUMIND_QDRANT_COLLECTION:documind-segments}
      api-key: ${DOCUMIND_QDRANT_API_KEY:}
      use-tls: ${DOCUMIND_QDRANT_USE_TLS:false}
      timeout-seconds: ${DOCUMIND_QDRANT_TIMEOUT_SECONDS:5}
      dimension: ${DOCUMIND_QDRANT_DIMENSION:384}
      # 仅迁移时显式设置 true；会清空本项目专用 collection 并从原始文档重新生成向量。
      rebuild-on-startup: ${DOCUMIND_QDRANT_REBUILD:false}

  # CORS 配置，生产环境必须改成真实域名。
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}

# Actuator 与可观测性配置。
management:
  endpoints:
    web:
      exposure:
        # 暴露健康检查、基础信息、指标和 Prometheus 采集端点。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # 只有授权用户可看健康检查详情。
      show-details: when-authorized

# 日志级别配置。
logging:
  level:
    com.documind: INFO
    dev.langchain4j: WARN
