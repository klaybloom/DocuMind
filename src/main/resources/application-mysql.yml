# MySQL + Redis 唯一运行 profile。
spring:
  datasource:
    url: ${DOCUMIND_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/documind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DOCUMIND_MYSQL_USERNAME:documind}
    password: ${DOCUMIND_MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: ${DOCUMIND_MYSQL_MAX_POOL_SIZE:20}
      minimum-idle: ${DOCUMIND_MYSQL_MIN_IDLE:2}
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    # 允许把已经按 V1 导入的 MySQL schema 纳入 Flyway 管理。
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: ${DOCUMIND_REDIS_HOST:127.0.0.1}
      port: ${DOCUMIND_REDIS_PORT:6379}
      password: ${DOCUMIND_REDIS_PASSWORD:}
      timeout: ${DOCUMIND_REDIS_TIMEOUT:2s}

app:
  vector-store:
    qdrant:
      host: ${DOCUMIND_QDRANT_HOST:127.0.0.1}
      grpc-port: ${DOCUMIND_QDRANT_GRPC_PORT:6334}
      health-url: ${DOCUMIND_QDRANT_HEALTH_URL:http://127.0.0.1:6333/healthz}
      collection: ${DOCUMIND_QDRANT_COLLECTION:documind-segments}
      api-key: ${DOCUMIND_QDRANT_API_KEY:}
      use-tls: ${DOCUMIND_QDRANT_USE_TLS:false}
      timeout-seconds: ${DOCUMIND_QDRANT_TIMEOUT_SECONDS:5}
      dimension: ${DOCUMIND_QDRANT_DIMENSION:384}
      rebuild-on-startup: ${DOCUMIND_QDRANT_REBUILD:false}
  chat:
    session:
      ttl-minutes: ${DOCUMIND_CHAT_SESSION_TTL_MINUTES:30}
      max-messages: ${DOCUMIND_CHAT_SESSION_MAX_MESSAGES:10}
    idempotency:
      ttl-hours: ${DOCUMIND_IDEMPOTENCY_TTL_HOURS:24}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}
  security:
    admin-username: ${DOCUMIND_ADMIN_USERNAME:admin}
    admin-password: ${DOCUMIND_ADMIN_PASSWORD:}
    user-username: ${DOCUMIND_USER_USERNAME:}
    user-password: ${DOCUMIND_USER_PASSWORD:}
    user-knowledge-bases: ${DOCUMIND_USER_KNOWLEDGE_BASES:default}
    min-password-length: ${DOCUMIND_MIN_PASSWORD_LENGTH:12}
