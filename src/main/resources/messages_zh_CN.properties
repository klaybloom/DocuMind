# Bean Validation 中文消息
NotBlank=不能为空
NotEmpty=不能为空
NotNull=不能为空
Size=长度必须在 {min} 到 {max} 之间
Length=长度必须在 {min} 到 {max} 之间
Min=不能小于 {value}
Max=不能大于 {value}
Positive=必须为正数
PositiveOrZero=必须为正数或零
Negative=必须为负数
NegativeOrZero=必须为负数或零
Email=邮箱格式不正确
Pattern=格式不正确
AssertTrue=必须为真
AssertFalse=必须为假
DecimalMin=不能小于 {value}
DecimalMax=不能大于 {value}
Digits=数字格式不正确
Future=必须为未来日期
FutureOrPresent=必须为当前或未来日期
Past=必须为过去日期
PastOrPresent=必须为当前或过去日期
