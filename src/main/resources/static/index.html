<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind | 智能文档助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="stylesheet" href="style.css?v=8">
</head>

<body>
    <!-- 登录界面 -->
    <div class="login-screen" id="login-screen">
        <div class="login-card">
            <div class="login-logo">🧠</div>
            <h1 class="login-title">DocuMind</h1>
            <p class="login-subtitle">请登录以继续</p>
            <form id="login-form" autocomplete="on">
                <div class="login-field">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" name="username" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                </div>
                <div class="login-error hidden" id="login-error"></div>
                <button type="submit" class="login-btn" id="login-btn">登录</button>
            </form>
        </div>
    </div>

    <!-- 主应用（登录后显示） -->
    <div class="app-root hidden" id="app-root">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <span class="brand-mark">D</span>
                <span>DocuMind</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn" type="button" aria-label="开启新对话" title="开启新对话">
                <i data-lucide="square-pen"></i>
            </button>
            <button class="mobile-sidebar-close" id="mobile-sidebar-close" type="button" aria-label="关闭侧边栏" title="关闭侧边栏">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="sidebar-scroll">
            <div class="sidebar-section">
                <div class="section-label">历史对话</div>
                <ul class="history-list" id="history-list">
                    <!-- 历史对话将在此处动态加载 -->
                </ul>
                <div class="history-empty" id="history-empty">暂无历史对话</div>
            </div>

        </div>

        <div class="sidebar-footer">
            <div class="user-info hidden" id="user-info">
                <div class="user-avatar" id="user-avatar">A</div>
                <div class="user-detail">
                    <span class="user-name" id="user-name">用户</span>
                    <span class="user-role" id="user-role">普通用户</span>
                </div>
                <button class="logout-btn" id="logout-btn" type="button" title="退出登录">⏻</button>
            </div>
            <button class="sidebar-action-btn hidden" id="admin-console-btn" type="button">
                <i data-lucide="shield-check"></i>
                后台管理
            </button>
            <button class="sidebar-action-btn secondary" id="theme-toggle" type="button" aria-label="切换日间夜间模式">
                <i data-lucide="moon"></i>
                <span id="theme-label">夜间模式</span>
            </button>
        </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="main-chat">
        <header class="chat-topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="收起或展开侧边栏" title="收起或展开侧边栏">
                    <i data-lucide="panel-left"></i>
                </button>
                <div class="topbar-title">
                    <span>DocuMind</span>
                </div>
            </div>
            <div class="topbar-right">
                <span class="topbar-kb-label">知识库</span>
                <select id="knowledge-base-select"></select>
                <label class="debug-toggle-label" title="启用后显示检索调试信息">
                    <input type="checkbox" id="debug-toggle">
                    <span>Debug</span>
                </label>
            </div>
        </header>

        <!-- 聊天容器 -->
        <div class="chat-container" id="chat-messages">
            <!-- 欢迎页面 -->
            <div class="welcome-screen" id="welcome-screen">
                <h1>今天想了解什么？</h1>

                <div class="prompt-grid">
                    <button class="prompt-chip" type="button" data-prompt="总结当前文档的核心内容">
                        <span>总结当前文档</span>
                        <small>提炼主要内容和结论</small>
                    </button>
                    <button class="prompt-chip" type="button" data-prompt="提取文档中的关键信息和待办事项">
                        <span>提取关键信息</span>
                        <small>列出事实、日期和待办</small>
                    </button>
                    <button class="prompt-chip" type="button" data-prompt="根据已上传文档回答我的问题">
                        <span>根据文档问答</span>
                        <small>只基于知识库内容回答</small>
                    </button>
                    <button class="prompt-chip" type="button" data-prompt="列出文档里可能需要进一步确认的内容">
                        <span>列出待确认内容</span>
                        <small>发现缺口和不确定信息</small>
                    </button>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-container-inner">
                <div class="input-box">
                    <textarea id="user-input" placeholder="输入您想咨询的问题..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </div>
                <div style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 15px;">
                    DocuMind 可能会产生错误，请谨慎使用并核实重要信息。
                </div>
            </div>
        </div>
    </main>

    </div><!-- /app-root -->

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script type="module" src="app.js?v=10"></script>
</body>

</html>
