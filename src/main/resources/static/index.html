<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind | 智能文档助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="stylesheet" href="style.css?v=8">
</head>

<body>
    <!-- 登录界面 -->
    <div class="login-screen" id="login-screen">
        <div class="login-card">
            <div class="login-logo">🧠</div>
            <h1 class="login-title">DocuMind</h1>
            <p class="login-subtitle">请登录以继续</p>
            <form id="login-form" autocomplete="on">
                <div class="login-field">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" name="username" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                </div>
                <div class="login-error hidden" id="login-error"></div>
                <button type="submit" class="login-btn" id="login-btn">登录</button>
            </form>
        </div>
    </div>

    <!-- 主应用（登录后显示） -->
    <div class="app-root hidden" id="app-root">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <span class="brand-mark">D</span>
                <span>DocuMind</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn" type="button" aria-label="开启新对话" title="开启新对话">
                <i data-lucide="square-pen"></i>
            </button>
            <button class="mobile-sidebar-close" id="mobile-sidebar-close" type="button" aria-label="关闭侧边栏" title="关闭侧边栏">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="sidebar-scroll">
            <div class="sidebar-section">
                <div class="section-label">历史对话</div>
                <ul class="history-list" id="history-list">
                    <!-- 历史对话将在此处动态加载 -->
                </ul>
                <div class="history-empty" id="history-empty">暂无历史对话</div>
            </div>

        </div>

        <div class="sidebar-footer">
            <div class="user-info hidden" id="user-info">
                <div class="user-avatar" id="user-avatar">A</div>
                <div class="user-detail">
                    <span class="user-name" id="user-name">用户</span>
                    <span class="user-role" id="user-role">普通用户</span>
                </div>
                <button class="logout-btn" id="logout-btn" type="button" title="退出登录">⏻</button>
            </div>
            <button class="sidebar-action-btn" id="documents-btn" type="button">
                <i data-lucide="folder-open"></i>
                文档管理
            </button>
            <button class="sidebar-action-btn secondary" id="theme-toggle" type="button" aria-label="切换日间夜间模式">
                <i data-lucide="moon"></i>
                <span id="theme-label">夜间模式</span>
            </button>
        </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="main-chat">
        <header class="chat-topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="收起或展开侧边栏" title="收起或展开侧边栏">
                    <i data-lucide="panel-left"></i>
                </button>
                <button class="topbar-title" type="button" id="topbar-documents-btn">
                    <span>DocuMind</span>
                    <i data-lucide="chevron-down"></i>
                </button>
            </div>
            <div class="topbar-right">
                <span class="topbar-kb-label">知识库</span>
                <select id="knowledge-base-select"></select>
                <label class="debug-toggle-label" title="启用后显示检索调试信息">
                    <input type="checkbox" id="debug-toggle">
                    <span>Debug</span>
                </label>
            </div>
        </header>

        <!-- 聊天容器 -->
        <div class="chat-container" id="chat-messages">
            <!-- 欢迎页面 -->
            <div class="welcome-screen" id="welcome-screen">
                <h1>今天想了解什么？</h1>

                <div class="prompt-grid">
                    <button class="prompt-chip" type="button" data-prompt="总结当前文档的核心内容">
                        <span>总结当前文档</span>
                        <small>提炼主要内容和结论</small>
                    </button>
                    <button class="prompt-chip" type="button" data-prompt="提取文档中的关键信息和待办事项">
                        <span>提取关键信息</span>
                        <small>列出事实、日期和待办</small>
                    </button>
                    <button class="prompt-chip" type="button" data-prompt="根据已上传文档回答我的问题">
                        <span>根据文档问答</span>
                        <small>只基于知识库内容回答</small>
                    </button>
                    <button class="prompt-chip" type="button" data-prompt="列出文档里可能需要进一步确认的内容">
                        <span>列出待确认内容</span>
                        <small>发现缺口和不确定信息</small>
                    </button>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-container-inner">
                <div class="input-box">
                    <textarea id="user-input" placeholder="输入您想咨询的问题..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </div>
                <div style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 15px;">
                    DocuMind 可能会产生错误，请谨慎使用并核实重要信息。
                </div>
            </div>
        </div>
    </main>

    <div class="modal-backdrop hidden" id="document-modal" aria-hidden="true">
        <section class="document-modal" role="dialog" aria-modal="true" aria-labelledby="document-modal-title">
            <div class="modal-header">
                <div>
                    <h2 id="document-modal-title">文档管理</h2>
                    <p>上传、查看和删除知识库文档</p>
                </div>
                <button class="icon-btn" id="close-document-modal" type="button" aria-label="关闭文档管理">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="doc-manager-panel" id="doc-manager-panel">
                <input type="file" id="file-input" hidden accept=".pdf,.txt,.doc,.docx,.ppt,.pptx,.xls,.xlsx">
                <div class="knowledge-base-admin">
                    <label for="document-knowledge-base-select">目标知识库</label>
                    <div class="knowledge-base-admin-row">
                        <select id="document-knowledge-base-select"></select>
                        <input id="knowledge-base-input" type="text" maxlength="60" placeholder="新知识库名，可留空">
                    </div>
                    <input id="document-owner-input" type="text" maxlength="80" placeholder="负责人，可留空">
                </div>
                <button class="upload-dropzone" id="upload-btn" type="button">
                    <i data-lucide="upload-cloud"></i>
                    <span>上传文档</span>
                    <small>支持 PDF、Word、Excel、PPT、TXT，默认单个文件最大 50MB，可由部署配置调整</small>
                </button>
                <p class="modal-message" id="upload-status"></p>

                <div class="document-list-header">
                    <span>知识库状态</span>
                </div>
                <ul class="status-list" id="status-list"></ul>

                <div class="document-list-header">
                    <span>文档列表</span>
                    <div class="document-list-actions">
                        <button class="icon-text-btn" id="batch-toggle-btn" type="button" title="批量选择">
                            <i data-lucide="list-check"></i>
                            批量
                        </button>
                        <button class="icon-text-btn" id="reindex-btn" type="button" title="重新构建索引">
                            <i data-lucide="rotate-cw"></i>
                            重新索引
                        </button>
                        <button class="icon-text-btn" id="refresh-files-btn" type="button">
                            <i data-lucide="refresh-cw"></i>
                            刷新
                        </button>
                    </div>
                </div>
                <div class="batch-bar hidden" id="batch-bar">
                    <label class="batch-select-all">
                        <input type="checkbox" id="batch-select-all-cb">
                        <span>全选</span>
                    </label>
                    <button class="batch-delete-btn" id="batch-delete-btn" type="button" disabled>
                        <i data-lucide="trash-2"></i>
                        删除选中 (<span id="batch-count">0</span>)
                    </button>
                    <button class="batch-cancel-btn" id="batch-cancel-btn" type="button">取消</button>
                </div>
                <ul class="file-list" id="file-list"></ul>
                <div class="file-empty" id="file-empty">暂无文档</div>

                <div class="document-list-header">
                    <span>知识缺口</span>
                    <button class="icon-text-btn" id="generate-faq-btn" type="button">
                        <i data-lucide="file-text"></i>
                        生成 FAQ 草稿
                    </button>
                </div>
                <ul class="gap-list" id="gap-list"></ul>
                <div class="gap-empty" id="gap-empty">暂无知识缺口</div>
                <textarea class="faq-draft" id="faq-draft" readonly hidden></textarea>

                <div class="document-list-header">
                    <span>最近操作</span>
                </div>
                <ul class="audit-list" id="audit-list"></ul>
                <div class="audit-empty" id="audit-empty">暂无审计记录</div>
            </div>
        </section>
    </div>
    </div><!-- /app-root -->

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script src="app.js?v=8"></script>
</body>

</html>
