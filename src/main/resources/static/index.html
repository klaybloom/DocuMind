<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind | 智能文档助手</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <button class="new-chat-btn" id="new-chat-btn">
            <i class="fas fa-plus"></i>
            开启新对话
        </button>

        <div class="sidebar-scroll">
            <div class="sidebar-section">
                <div class="section-label">历史对话</div>
                <ul class="history-list" id="history-list">
                    <!-- 历史对话将在此处动态加载 -->
                </ul>
                <div class="history-empty" id="history-empty">暂无历史对话</div>
            </div>

        </div>

        <div class="sidebar-footer">
            <button class="sidebar-action-btn" id="documents-btn" type="button">
                <i class="fas fa-folder-open"></i>
                文档管理
            </button>
            <button class="sidebar-action-btn secondary" id="theme-toggle" type="button" aria-label="切换日间夜间模式">
                <i class="fas fa-moon"></i>
                <span id="theme-label">夜间模式</span>
            </button>
        </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="main-chat">
        <!-- 聊天容器 -->
        <div class="chat-container" id="chat-messages">
            <!-- 欢迎页面 -->
            <div class="welcome-screen" id="welcome-screen">
                <h1>DocuMind</h1>
                <p>选择一个问题开始对话</p>

                <div class="prompt-grid">
                    <button class="prompt-chip" type="button" data-prompt="总结当前文档的核心内容">总结当前文档</button>
                    <button class="prompt-chip" type="button" data-prompt="提取文档中的关键信息和待办事项">提取关键信息</button>
                    <button class="prompt-chip" type="button" data-prompt="根据已上传文档回答我的问题">根据文档问答</button>
                    <button class="prompt-chip" type="button" data-prompt="列出文档里可能需要进一步确认的内容">列出待确认内容</button>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-container-inner">
                <div class="input-box">
                    <textarea id="user-input" placeholder="输入您想咨询的问题..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 15px;">
                    DocuMind 可能会产生错误，请谨慎使用并核实重要信息。
                </div>
            </div>
        </div>
    </main>

    <div class="modal-backdrop hidden" id="document-modal" aria-hidden="true">
        <section class="document-modal" role="dialog" aria-modal="true" aria-labelledby="document-modal-title">
            <div class="modal-header">
                <div>
                    <h2 id="document-modal-title">文档管理</h2>
                    <p>上传、查看和删除知识库文档</p>
                </div>
                <button class="icon-btn" id="close-document-modal" type="button" aria-label="关闭文档管理">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="doc-lock-panel" id="doc-lock-panel">
                <label for="document-password">管理密码</label>
                <div class="password-row">
                    <input id="document-password" type="password" autocomplete="current-password" placeholder="输入密码后上传文档">
                    <button class="primary-btn" id="unlock-documents-btn" type="button">解锁</button>
                </div>
                <p class="modal-message" id="document-lock-message"></p>
            </div>

            <div class="doc-manager-panel hidden" id="doc-manager-panel">
                <input type="file" id="file-input" hidden accept=".pdf,.txt,.doc,.docx,.ppt,.pptx,.xls,.xlsx">
                <button class="upload-dropzone" id="upload-btn" type="button">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>上传文档</span>
                    <small>支持 PDF、Word、Excel、PPT、TXT，单个文件最大 50MB</small>
                </button>
                <p class="modal-message" id="upload-status"></p>

                <div class="document-list-header">
                    <span>文档列表</span>
                    <button class="icon-text-btn" id="refresh-files-btn" type="button">
                        <i class="fas fa-sync-alt"></i>
                        刷新
                    </button>
                </div>
                <ul class="file-list" id="file-list"></ul>
                <div class="file-empty" id="file-empty">暂无文档</div>
            </div>
        </section>
    </div>

    <script src="app.js?v=6"></script>
</body>

</html>
