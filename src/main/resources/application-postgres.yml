# PostgreSQL 验证 profile：用于本机 Docker 和 CI service container。
# 启用方式：SPRING_PROFILES_ACTIVE=postgres

spring:
  datasource:
    url: ${DOCUMIND_DB_URL:}
    driver-class-name: org.postgresql.Driver
    username: ${DOCUMIND_DB_USERNAME:documind}
    password: ${DOCUMIND_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

app:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}
  security:
    admin-username: ${DOCUMIND_ADMIN_USERNAME:admin}
    admin-password: ${DOCUMIND_ADMIN_PASSWORD:}
    user-username: ${DOCUMIND_USER_USERNAME:}
    user-password: ${DOCUMIND_USER_PASSWORD:}
    user-knowledge-bases: ${DOCUMIND_USER_KNOWLEDGE_BASES:default}
    min-password-length: ${DOCUMIND_MIN_PASSWORD_LENGTH:12}
