# Production profile: WARN logging, tightened CORS, connection pool tuning
# Activate with: --spring.profiles.active=prod

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}

logging:
  level:
    com.documind: WARN
    dev.langchain4j: WARN
    org.springframework: WARN
    org.springframework.security: WARN
