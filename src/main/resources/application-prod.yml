# 生产环境配置：使用文件 H2、连接池参数、收敛日志级别，并要求外部注入密钥和密码。
# 启用方式：--spring.profiles.active=prod

spring:
  datasource:
    # H2 文件库路径必须指向持久化目录，避免容器重建后数据丢失。
    url: jdbc:h2:file:${DOCUMIND_DB_PATH:${user.dir}/documents/.documind-db};DB_CLOSE_DELAY=-1;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: ${DOCUMIND_DB_USERNAME:sa}
    password: ${DOCUMIND_DB_PASSWORD:}
    hikari:
      # 单实例部署的数据库连接池参数。
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
  jpa:
    hibernate:
      # 当前项目尚未接入 Flyway/Liquibase，生产默认仍使用 update。
      ddl-auto: ${DOCUMIND_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        # 生产环境关闭 SQL 美化和统计，减少日志和运行开销。
        format_sql: false
        generate_statistics: false

app:
  cors:
    # 生产环境必须设置为实际前端域名。
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}
  deepseek:
    # DeepSeek 密钥只允许从环境变量或密钥管理系统注入。
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}
  security:
    # 管理员和可选普通用户初始化参数。
    admin-username: ${DOCUMIND_ADMIN_USERNAME:admin}
    admin-password: ${DOCUMIND_ADMIN_PASSWORD:}
    user-username: ${DOCUMIND_USER_USERNAME:}
    user-password: ${DOCUMIND_USER_PASSWORD:}
    user-knowledge-bases: ${DOCUMIND_USER_KNOWLEDGE_BASES:default}
    min-password-length: ${DOCUMIND_MIN_PASSWORD_LENGTH:12}

logging:
  level:
    # 生产环境默认只输出 WARN 及以上日志。
    com.documind: WARN
    dev.langchain4j: WARN
    org.springframework: WARN
    org.springframework.security: WARN
