# 测试 profile：使用独立 MySQL schema 和测试专用账号配置。
spring:
  datasource:
    url: ${DOCUMIND_MYSQL_TEST_URL:jdbc:mysql://127.0.0.1:3306/documind_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DOCUMIND_MYSQL_TEST_USERNAME:${DOCUMIND_MYSQL_USERNAME:documind}}
    password: ${DOCUMIND_MYSQL_TEST_PASSWORD:${DOCUMIND_MYSQL_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: ${DOCUMIND_REDIS_HOST:127.0.0.1}
      port: ${DOCUMIND_REDIS_PORT:6379}
      password: ${DOCUMIND_REDIS_PASSWORD:}

app:
  vector-store:
    qdrant:
      host: ${DOCUMIND_QDRANT_HOST:127.0.0.1}
      grpc-port: ${DOCUMIND_QDRANT_GRPC_PORT:6334}
      health-url: ${DOCUMIND_QDRANT_HEALTH_URL:http://127.0.0.1:6333/healthz}
      collection: ${DOCUMIND_QDRANT_COLLECTION:documind-test-segments}
      api-key: ${DOCUMIND_QDRANT_API_KEY:}
      use-tls: ${DOCUMIND_QDRANT_USE_TLS:false}
      timeout-seconds: ${DOCUMIND_QDRANT_TIMEOUT_SECONDS:5}
      dimension: 384
      rebuild-on-startup: false
  # 测试文档和索引写到临时目录。
  documents-path: ${java.io.tmpdir}/documind-test
  deepseek:
    # 测试不会调用真实 DeepSeek，这里只用于通过配置校验。
    api-key: configured-for-test-profile
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
  security:
    # 测试使用固定账号密码，不能复用到生产环境。
    admin-username: admin
    admin-password: test-profile-admin-password
    min-password-length: 8
