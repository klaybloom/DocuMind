services:
  postgres:
    image: postgres:16-alpine
    container_name: documind-postgres
    environment:
      POSTGRES_DB: documind
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - documind-postgres-data:/var/lib/postgresql/data

volumes:
  documind-postgres-data:
